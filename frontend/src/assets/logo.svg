<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="98" fill="#1a2744" stroke="#f97316" stroke-width="4"/>
  <!-- Burger bun top -->
  <ellipse cx="100" cy="78" rx="32" ry="14" fill="#f59e0b"/>
  <ellipse cx="100" cy="75" rx="30" ry="11" fill="#fbbf24"/>
  <!-- Sesame seeds -->
  <ellipse cx="92" cy="73" rx="3" ry="2" fill="#f97316" transform="rotate(-20 92 73)"/>
  <ellipse cx="102" cy="70" rx="3" ry="2" fill="#f97316" transform="rotate(10 102 70)"/>
  <ellipse cx="112" cy="73" rx="3" ry="2" fill="#f97316" transform="rotate(-15 112 73)"/>
  <!-- Lettuce -->
  <ellipse cx="100" cy="87" rx="34" ry="6" fill="#22c55e"/>
  <!-- Patty -->
  <ellipse cx="100" cy="93" rx="32" ry="8" fill="#92400e"/>
  <ellipse cx="100" cy="91" rx="30" ry="6" fill="#b45309"/>
  <!-- Cheese -->
  <ellipse cx="100" cy="98" rx="34" ry="5" fill="#fbbf24" opacity="0.9"/>
  <!-- Bun bottom -->
  <ellipse cx="100" cy="103" rx="32" ry="10" fill="#f59e0b"/>
  <ellipse cx="100" cy="106" rx="30" ry="8" fill="#fbbf24"/>
  <!-- Gear/cog around burger -->
  <g transform="translate(100,90)" fill="none" stroke="#f97316" stroke-width="2.5" opacity="0.7">
    <circle r="38"/>
    <path d="M-6-38 L6-38 L6-44 L-6-44Z" fill="#f97316"/>
    <path d="M-6 38 L6 38 L6 44 L-6 44Z" fill="#f97316"/>
    <path d="M38-6 L38 6 L44 6 L44-6Z" fill="#f97316"/>
    <path d="M-38-6 L-38 6 L-44 6 L-44-6Z" fill="#f97316"/>
    <path d="M22-30 L29-23 L33-27 L26-34Z" fill="#f97316"/>
    <path d="M-22 30 L-29 23 L-33 27 L-26 34Z" fill="#f97316"/>
    <path d="M30 22 L23 29 L27 33 L34 26Z" fill="#f97316"/>
    <path d="M-30-22 L-23-29 L-27-33 L-34-26Z" fill="#f97316"/>
  </g>
  <!-- Growth arrow -->
  <g opacity="0.9">
    <path d="M130 140 L160 105 L155 103 L165 95 L165 107 L160 105" fill="#f97316" stroke="#f97316" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M130 140 L160 105" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Chart bars -->
  <rect x="133" y="148" width="7" height="10" rx="1.5" fill="#3b82f6" opacity="0.8"/>
  <rect x="143" y="143" width="7" height="15" rx="1.5" fill="#3b82f6" opacity="0.8"/>
  <rect x="153" y="137" width="7" height="21" rx="1.5" fill="#3b82f6" opacity="0.8"/>
  <!-- Fork & Knife -->
  <g transform="translate(55,125)" opacity="0.85">
    <!-- Fork -->
    <line x1="0" y1="-20" x2="0" y2="20" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-4" y1="-20" x2="-4" y2="-8" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
    <line x1="4" y1="-20" x2="4" y2="-8" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
    <path d="M-4-8 Q0-4 4-8" fill="none" stroke="#94a3b8" stroke-width="2"/>
  </g>
  <g transform="translate(68,125) rotate(15)" opacity="0.85">
    <!-- Knife -->
    <line x1="0" y1="-20" x2="0" y2="20" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M0-20 Q6-10 0 0" fill="#94a3b8" opacity="0.6"/>
  </g>
  <!-- Binary data (top right) -->
  <text x="148" y="55" font-family="monospace" font-size="7" fill="#60a5fa" opacity="0.6">101</text>
  <text x="152" y="64" font-family="monospace" font-size="7" fill="#60a5fa" opacity="0.6">1011</text>
  <text x="148" y="73" font-family="monospace" font-size="7" fill="#60a5fa" opacity="0.6">001</text>
  <!-- Truck (top) -->
  <g transform="translate(115,38)" opacity="0.85">
    <rect x="0" y="0" width="20" height="12" rx="2" fill="#f59e0b"/>
    <rect x="14" y="3" width="10" height="9" rx="1" fill="#93c5fd"/>
    <circle cx="5" cy="14" r="3" fill="#374151"/>
    <circle cx="20" cy="14" r="3" fill="#374151"/>
  </g>
  <!-- POS terminal (top left) -->
  <g transform="translate(65,35)" opacity="0.85">
    <rect x="0" y="0" width="18" height="14" rx="2" fill="#6366f1"/>
    <rect x="2" y="2" width="14" height="8" rx="1" fill="#c7d2fe"/>
    <rect x="4" y="14" width="10" height="3" rx="1" fill="#4b5563"/>
    <rect x="7" y="17" width="4" height="2" rx="0.5" fill="#374151"/>
  </g>
  <!-- Connection dots -->
  <circle cx="85" cy="42" r="2.5" fill="#f97316" opacity="0.7"/>
  <circle cx="112" cy="42" r="2.5" fill="#f97316" opacity="0.7"/>
  <line x1="87" y1="42" x2="110" y2="42" stroke="#f97316" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
</svg>
